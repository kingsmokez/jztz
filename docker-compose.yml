# docker-compose.yml — local / single-host production
#
# Usage:
#   cp .env.example .env   # fill in WECOM_WEBHOOK etc.
#   docker compose up -d
#   curl http://localhost:5559/api/live
#
# Note: port 5559 (host) -> 5000 (container) preserves the existing
# v17 default while letting gunicorn bind a privileged port internally.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: jztz_v17:v19
    container_name: jztz-app
    restart: unless-stopped
    ports:
      - "5559:5000"
    env_file:
      - .env
    environment:
      PORT: "5000"
      PYTHONUNBUFFERED: "1"
      GUNICORN_WORKERS: "2"
      GUNICORN_THREADS: "4"
    volumes:
      # Persist logs outside the container so they survive `docker compose down`
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:5000/api/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    # Optional resource cap — bump on a beefier host
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M

  # Optional Redis sidecar for future cache backend.  Disabled by default —
  # uncomment `depends_on` + `app` env vars when wiring it up.
  # redis:
  #   image: redis:7-alpine
  #   container_name: jztz-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data

